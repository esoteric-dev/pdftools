<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redact Bank Account Info from Statement | Free Local Tool</title>
    <meta name="description" content="Securely blackout bank account numbers and routing info from statements before sharing them. 100% offline document processor.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a', darker: '#020617' } } } }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="/styles.css">

    <script>
        window.PSEO_CONFIG = {
            h1: "Redact Bank Account Info From Statements",
            subtitle: "Applying for a loan or apartment? Hide your account numbers locally. No data leaves your browser.",
            seoTitle: "Secure Financial Statement Scrubbing",
            seoText: "Lenders and landlords need to see your income, but they rarely need your full account routing details. Simply drawing a black box in a normal PDF editor leaves the text recoverable. Use our secure tool to rasterize and flatten the statement—guaranteeing your financial privacy."
        };
    </script>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root"></div>
    <script type="text/babel" src="/privacy.js"></script>
</body>
</html>
