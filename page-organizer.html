<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Page Organizer | Reorder, Rotate & Delete Pages Locally</title>
    <meta name="description" content="Visually reorder, rotate, and delete pages from any PDF document. 100% local browser processing — your files never leave your computer.">

    <!-- SEO tags -->
    <link rel="canonical" href="https://www.varalabs.systems/page-organizer.html" />
    
    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="PDF Page Organizer | Reorder, Rotate & Delete Pages Locally">
    <meta property="og:description" content="Visually reorder, rotate, and delete pages from any PDF document. 100% local browser processing — your files never leave your computer.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.varalabs.systems/page-organizer.html">
    <meta property="og:image" content="https://www.varalabs.systems/og-image.jpg">

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PDF Page Organizer | Reorder, Rotate & Delete Pages Locally">
    <meta name="twitter:description" content="Visually reorder, rotate, and delete pages from any PDF document. 100% local browser processing — your files never leave your computer.">
    <meta name="twitter:image" content="https://www.varalabs.systems/og-image.jpg">

    <!-- JSON-LD Schema for SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VaraLabs PDF Page Organizer",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "url": "https://www.varalabs.systems/page-organizer.html",
      "description": "Visually reorder, rotate, and delete pages from any PDF document. 100% local browser processing — your files never leave your computer.",
      "publisher": {
        "@type": "Organization",
        "name": "VaraLabs"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF.js for rendering page thumbnails -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <!-- WASM PDF Processor -->
    <script src="pdf-processor/pkg/pdf_processor.js"></script>

    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root"></div>
    <script type="text/babel" src="/page-organizer.js"></script>
</body>
</html>
