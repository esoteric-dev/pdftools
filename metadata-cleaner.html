<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaraLabs Metadata Cleaner | Remove GPS from real estate photos</title>
    <meta name="description" content="varalabs.systems resources: A secure, client-side tool to strip EXIF data, GPS coordinates, and author information from your photos. Perfect for real estate agents and privacy-conscious users.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // green emphasis for cleaner
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Exif.js for parsing image metadata -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <!-- PDF-lib (just in case) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel" src="metadata-cleaner.js"></script>
</body>
</html>
