<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Ensure compliance with our bank-grade Privacy Scrubber. Clean metadata from PDFs and images locally—trusted by legal and financial professionals.">
    
    <!-- SEO tags -->
    <link rel="canonical" href="https://www.varalabs.systems/metadata-cleaner.html" />
    
    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="Privacy Scrubber for Law & Finance | Remove Metadata">
    <meta property="og:description" content="Ensure compliance with our bank-grade Privacy Scrubber. Clean metadata from PDFs and images locally—trusted by legal and financial professionals.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.varalabs.systems/metadata-cleaner.html">
    <meta property="og:image" content="https://www.varalabs.systems/og-image.jpg">

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Privacy Scrubber for Law & Finance | Remove Metadata">
    <meta name="twitter:description" content="Ensure compliance with our bank-grade Privacy Scrubber. Clean metadata from PDFs and images locally—trusted by legal and financial professionals.">
    <meta name="twitter:image" content="https://www.varalabs.systems/og-image.jpg">

    <!-- JSON-LD Schema for SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VaraLabs Metadata Cleaner",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "url": "https://www.varalabs.systems/metadata-cleaner.html",
      "description": "Ensure compliance with our bank-grade Privacy Scrubber. Clean metadata from PDFs and images locally—trusted by legal and financial professionals.",
      "publisher": {
        "@type": "Organization",
        "name": "VaraLabs"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // green emphasis for cleaner
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Exif.js for parsing image metadata -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <!-- PDF-lib (just in case) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- WASM PDF Processor -->
    <script src="pdf-processor/pkg/pdf_processor.js"></script>

    <!-- JSZip for Batch Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root"></div>
