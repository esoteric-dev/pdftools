<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Scrubber for Law & Finance | Remove Metadata</title>
    <meta name="description" content="Ensure compliance with our bank-grade Privacy Scrubber. Clean metadata from PDFs and images locally—trusted by legal and financial professionals.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // green emphasis for cleaner
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Exif.js for parsing image metadata -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <!-- PDF-lib (just in case) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- WASM PDF Processor -->
    <script src="pdf-processor/pkg/pdf_processor.js"></script>

    <!-- JSZip for Batch Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel" src="metadata-cleaner.js?v=2"></script>
</body>
</html>
